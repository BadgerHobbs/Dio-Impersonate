name: Build native libraries

# Builds the libcurl-impersonate native libraries for mobile and publishes them
# as assets on a GitHub Release. Consumers (the BinDays app) download these at
# build time rather than vendoring binaries in their repo.
#
#   Android: ubuntu runner, one .so per ABI (validated).
#   iOS:     macOS runner, device + simulator xcframework.
#
# Trigger by pushing a tag like `native-v1`. The release assets are:
#   android-jniLibs.zip          (arm64-v8a/, armeabi-v7a/, x86_64/ -> jniLibs)
#   CurlImpersonate.xcframework.zip

on:
  workflow_dispatch:
  push:
    tags:
      - "native-v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake ninja-build \
            autoconf automake libtool gperf curl golang-go perl unzip patch
      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Build ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: bash native/build_android.sh ${{ matrix.abi }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: native/android/${{ matrix.abi }}/

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: brew install cmake ninja go
      - name: Build iOS xcframework (device + simulator)
        env:
          SDKS: "iphonesimulator iphoneos"
        run: bash native/build_ios.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: native/ios/CurlImpersonate.xcframework

  release:
    if: startsWith(github.ref, 'refs/tags/native-v')
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release assets
        run: |
          set -eux
          mkdir -p out jniLibs
          # Android: one jniLibs tree with an <abi>/ folder per ABI.
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "jniLibs/$abi"
            cp -R artifacts/android-$abi/. "jniLibs/$abi/"
          done
          (cd jniLibs && zip -r ../out/android-jniLibs.zip .)
          # iOS: re-wrap the xcframework contents under its top-level folder so
          # the zip extracts to CurlImpersonate.xcframework/ (what the podspec
          # vendors), then zip it.
          mkdir -p stage/CurlImpersonate.xcframework
          cp -R artifacts/ios-xcframework/. stage/CurlImpersonate.xcframework/
          (cd stage && zip -r ../out/CurlImpersonate.xcframework.zip CurlImpersonate.xcframework)
          ls -la out
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
