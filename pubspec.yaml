name: dio_impersonate
description: >-
  Browser TLS/JA3 + HTTP/2 impersonation for the Dio HTTP client, backed by the
  libcurl-impersonate shared library via dart:ffi.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0

dependencies:
  dio: ^5.0.0
  ffi: ^2.1.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
