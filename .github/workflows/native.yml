name: Build native libraries

# Builds the libcurl-impersonate native libraries for mobile (consumed by the
# BinDays app). Android is built on Ubuntu (validated); iOS on macOS (the
# native/build_ios.sh path is currently unvalidated — see its header).

on:
  workflow_dispatch:
  push:
    tags:
      - "native-v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake ninja-build \
            autoconf automake libtool gperf curl golang-go perl unzip patch

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: bash native/build_android.sh ${{ matrix.abi }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: native/android/${{ matrix.abi }}/

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install cmake ninja go

      - name: Build iOS xcframework
        run: bash native/build_ios.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: native/ios/libcurl-impersonate.xcframework

  release:
    if: startsWith(github.ref, 'refs/tags/native-v')
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          cd artifacts
          for d in */; do (cd "$d" && zip -r "../${d%/}.zip" .); done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
